name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Defense-in-depth: the workflow_run trigger's `branches: [main]` filter only
    # restricts the head branch of the triggering CI run. A CI run started by a
    # `pull_request` event can still satisfy that filter, so we must also require
    # the triggering event to be `push` and the head branch to be literally `main`
    # before exposing NPM_TOKEN / id-token.
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          # Node 24 ships with npm 11.x (required for OIDC Trusted Publishing).
          # Node 22 ships with npm 10.x and self-upgrading via 'npm install -g npm@latest' is unreliable in CI.
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: Enable corepack
        run: corepack enable
      - name: Resolve pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf  # v1.7.0
        id: changesets
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set ci-pass status on Version Packages PR
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          sleep 5
          PR_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          gh api "repos/${{ github.repository }}/statuses/${PR_SHA}" \
            -f state=success \
            -f context=ci-pass \
            -f description="Version Packages PR — source already verified on main"
          # Retry if SHA changed due to API eventual consistency
          sleep 5
          NEW_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          if [ "$NEW_SHA" != "$PR_SHA" ]; then
            gh api "repos/${{ github.repository }}/statuses/${NEW_SHA}" \
              -f state=success \
              -f context=ci-pass \
              -f description="Version Packages PR — source already verified on main"
          fi
