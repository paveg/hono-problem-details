name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf  # v1.7.0
        id: changesets
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Set ci-pass status on Version Packages PR
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          sleep 5
          PR_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          gh api "repos/${{ github.repository }}/statuses/${PR_SHA}" \
            -f state=success \
            -f context=ci-pass \
            -f description="Version Packages PR — source already verified on main"
          # Retry if SHA changed due to API eventual consistency
          sleep 5
          NEW_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          if [ "$NEW_SHA" != "$PR_SHA" ]; then
            gh api "repos/${{ github.repository }}/statuses/${NEW_SHA}" \
              -f state=success \
              -f context=ci-pass \
              -f description="Version Packages PR — source already verified on main"
          fi
